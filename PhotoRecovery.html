<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Photo Recovery — London 2026</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --card: #22222a;
    --border: #2e2e38;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --success: #3ecf8e;
    --danger: #f06464;
    --text: #e8e8f0;
    --muted: #7777a0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .header-top h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 8px;
    letter-spacing: 0.2px;
  }
  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .save-btn {
    position: fixed;
    bottom: max(16px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), #5b52d8);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 4px 24px rgba(124,106,247,0.5);
    letter-spacing: -0.2px;
    white-space: nowrap;
  }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-btn:active { transform: translateX(-50%) scale(0.97); }

  /* STATUS */
  #status {
    padding: 20px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* PHOTO GRID */
  .section-label {
    padding: 16px 16px 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 0 0 100px;
  }
  .photo-tile {
    position: relative;
    aspect-ratio: 1;
    background: var(--card);
    cursor: pointer;
    overflow: hidden;
  }
  .photo-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.2s;
  }
  .photo-tile:active img { transform: scale(0.95); }
  .photo-tile.assigned img { filter: brightness(0.55); }
  .photo-tile.assigned::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--success);
    font-weight: 900;
  }
  .photo-tile.broken { background: #1a0a0a; cursor: default; }
  .photo-tile.broken::before {
    content: '⚠️';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 1;
  }
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 20px 5px 5px;
    font-size: 9px;
    font-weight: 600;
    color: #fff;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* STOP PICKER SHEET */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 300;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .sheet-overlay.open { opacity: 1; }
  .sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sheet-overlay.open .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .sheet-header {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sheet-header h2 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .sheet-header p { font-size: 12px; color: var(--muted); }
  .sheet-preview {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    float: right;
    margin-left: 8px;
  }
  .sheet-body { overflow-y: auto; flex: 1; }
  
  .day-group { border-bottom: 1px solid var(--border); }
  .day-label {
    padding: 10px 16px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--accent);
    background: var(--bg);
    position: sticky;
    top: 0;
  }
  .stop-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    cursor: pointer;
    border-top: 1px solid var(--border);
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .stop-row:active { background: var(--card); }
  .stop-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .stop-info { flex: 1; min-width: 0; }
  .stop-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stop-count { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .stop-arrow { color: var(--muted); font-size: 14px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    opacity: 0;
    transition: all 0.3s;
    z-index: 500;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span>📷</span>
    <h1>Photo Recovery</h1>
    <span class="badge" id="totalBadge">Loading…</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label">
    <span id="progressLabel">Loading photos from Storage…</span>
    <span id="progressRight"></span>
  </div>
</div>

<div id="status"><span class="spinner">⏳</span> Connecting to Supabase…</div>
<div class="section-label" id="gridLabel" style="display:none">Tap a photo to assign it to a stop</div>
<div class="photo-grid" id="photoGrid"></div>

<button class="save-btn" id="saveBtn" onclick="saveToTrip()" disabled>💾 Save to Trip</button>

<!-- Stop picker sheet -->
<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <img class="sheet-preview" id="sheetPreview" src="" alt="">
      <h2>Assign to stop</h2>
      <p id="sheetUrl"></p>
    </div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL = 'https://wnpanbjzmcsvhfyjdczv.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InducGFuYmp6bWNzdmhmeWpkY3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzU4NjcsImV4cCI6MjA5MjA1MTg2N30.r3Vie2AAOfzYmLy4IRUk1s9mjkC6bDSoxAIYKfcz6jQ';
const BUCKET = 'trip-photos';
const TRIPS = ['london2026', 'newyork2026', 'stlouismo'];

const supa = supabase.createClient(SUPA_URL, ANON_KEY);

let allPhotos = []; // {url, filename, tripId, assigned: null|{dayIdx,stopIdx}}
let tripData = {};  // tripId -> {days: [{title, stops:[{name,...,userPhotos:[]}]}]}
let currentPhotoIdx = null;

async function init() {
  status('Fetching trip data…');
  
  // Load all trips
  for (const tripId of TRIPS) {
    const { data, error } = await supa.from('trips').select('*').eq('id', tripId).maybeSingle();
    if (data && data.data && data.data.days) {
      tripData[tripId] = data.data;
    }
  }

  status('Listing Storage files…');
  
  // List files from all trips
  for (const tripId of TRIPS) {
    const { data: files, error } = await supa.storage.from(BUCKET).list(tripId + '/', { limit: 1000 });
    if (files && files.length) {
      for (const f of files) {
        if (!f.name || f.name === '.emptyFolderPlaceholder') continue;
        const filename = tripId + '/' + f.name;
        const url = SUPA_URL + '/storage/v1/object/public/' + BUCKET + '/' + filename;
        allPhotos.push({ url, filename, tripId, assigned: null });
      }
    }
  }

  if (!allPhotos.length) {
    status('❌ No photos found in Storage. Check bucket name or permissions.');
    return;
  }

  // Pre-assign: mark photos already referenced in trip data
  for (const tripId of TRIPS) {
    const td = tripData[tripId];
    if (!td) continue;
    (td.days || []).forEach((day, di) => {
      (day.stops || []).forEach((stop, si) => {
        (stop.userPhotos || []).forEach(photoUrl => {
          if (!photoUrl || !photoUrl.includes(BUCKET)) return;
          const match = photoUrl.match(/\/trip-photos\/([^?#]+)/);
          if (!match) return;
          const filename = decodeURIComponent(match[1]);
          const found = allPhotos.find(p => p.filename === filename);
          if (found && !found.assigned) {
            found.assigned = { tripId, dayIdx: di, stopIdx: si };
          }
        });
      });
    });
  }

  document.getElementById('status').style.display = 'none';
  document.getElementById('gridLabel').style.display = '';
  renderGrid();
  updateProgress();
}

function renderGrid() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  // Unassigned first, then assigned
  const sorted = [
    ...allPhotos.filter(p => !p.assigned),
    ...allPhotos.filter(p => p.assigned)
  ];
  sorted.forEach((photo, i) => {
    const origIdx = allPhotos.indexOf(photo);
    const tile = document.createElement('div');
    tile.className = 'photo-tile' + (photo.assigned ? ' assigned' : '');
    tile.dataset.idx = origIdx;
    tile.innerHTML = `<img src="${photo.url}" loading="lazy" onerror="this.parentNode.classList.add('broken');this.style.display='none'">`;
    if (photo.assigned) {
      const day = tripData[photo.assigned.tripId]?.days?.[photo.assigned.dayIdx];
      const stop = day?.stops?.[photo.assigned.stopIdx];
      const tag = document.createElement('div');
      tag.className = 'stop-tag';
      tag.textContent = stop ? stop.name : '✓ Assigned';
      tile.appendChild(tag);
    }
    tile.addEventListener('click', () => openSheet(origIdx));
    grid.appendChild(tile);
  });
}

function updateProgress() {
  const total = allPhotos.length;
  const assigned = allPhotos.filter(p => p.assigned).length;
  const pct = total ? Math.round(assigned / total * 100) : 0;
  document.getElementById('totalBadge').textContent = total + ' photos';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = assigned + ' of ' + total + ' assigned';
  document.getElementById('progressRight').textContent = pct + '%';
  document.getElementById('saveBtn').disabled = assigned === 0;
}

function openSheet(photoIdx) {
  currentPhotoIdx = photoIdx;
  const photo = allPhotos[photoIdx];
  document.getElementById('sheetPreview').src = photo.url;
  document.getElementById('sheetUrl').textContent = photo.filename;
  
  // Build stop list
  const body = document.getElementById('sheetBody');
  body.innerHTML = '';
  
  TRIPS.forEach(tripId => {
    const td = tripData[tripId];
    if (!td) return;
    (td.days || []).forEach((day, di) => {
      if (!day.stops || !day.stops.length) return;
      const group = document.createElement('div');
      group.className = 'day-group';
      const lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.textContent = (tripId !== 'london2026' ? tripId + ' · ' : '') + (day.title || 'Day ' + (di+1));
      group.appendChild(lbl);
      day.stops.forEach((stop, si) => {
        const count = (stop.userPhotos || []).filter(u => u && u.includes(BUCKET)).length;
        const alreadyAssignedHere = photo.assigned && photo.assigned.tripId === tripId && photo.assigned.dayIdx === di && photo.assigned.stopIdx === si;
        const row = document.createElement('div');
        row.className = 'stop-row';
        row.innerHTML = `
          <div class="stop-num">${si+1}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.name || 'Stop ' + (si+1)}</div>
            <div class="stop-count">${count} photo${count !== 1 ? 's' : ''}${alreadyAssignedHere ? ' · ✓ assigned here' : ''}</div>
          </div>
          <div class="stop-arrow">${alreadyAssignedHere ? '✓' : '›'}</div>
        `;
        row.style.opacity = alreadyAssignedHere ? '0.6' : '1';
        row.addEventListener('click', () => assignPhoto(tripId, di, si));
        group.appendChild(row);
      });
      body.appendChild(group);
    });
  });

  const overlay = document.getElementById('sheet');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('open'));
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheet')) return;
  const overlay = document.getElementById('sheet');
  overlay.classList.remove('open');
  setTimeout(() => { overlay.style.display = 'none'; }, 300);
}

function assignPhoto(tripId, dayIdx, stopIdx) {
  const photo = allPhotos[currentPhotoIdx];
  photo.assigned = { tripId, dayIdx, stopIdx };
  
  // Add to trip data in memory
  const stop = tripData[tripId].days[dayIdx].stops[stopIdx];
  if (!stop.userPhotos) stop.userPhotos = [];
  // Avoid duplicates
  const pubUrl = photo.url;
  if (!stop.userPhotos.includes(pubUrl)) {
    stop.userPhotos.push(pubUrl);
  }

  closeSheet(null);
  setTimeout(() => {
    renderGrid();
    updateProgress();
    const stop = tripData[tripId].days[dayIdx].stops[stopIdx];
    toast('📍 Added to ' + (stop.name || 'stop ' + (stopIdx+1)));
  }, 320);
}

// Convert any signed/old URL to canonical public URL
function toPublicUrl(url) {
  if (!url) return url;
  if (url.includes('/object/public/')) return url; // already public
  const match = url.match(/\/trip-photos\/([^?#]+)/);
  if (!match) return url;
  return SUPA_URL + '/storage/v1/object/public/' + BUCKET + '/' + decodeURIComponent(match[1]);
}

async function saveToTrip() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Saving…';

  // Build a map: tripId -> { dayIdx -> { stopIdx -> [publicUrls] } }
  const assignments = {};
  allPhotos.filter(p => p.assigned).forEach(photo => {
    const { tripId, dayIdx, stopIdx } = photo.assigned;
    if (!assignments[tripId]) assignments[tripId] = {};
    if (!assignments[tripId][dayIdx]) assignments[tripId][dayIdx] = {};
    if (!assignments[tripId][dayIdx][stopIdx]) assignments[tripId][dayIdx][stopIdx] = [];
    assignments[tripId][dayIdx][stopIdx].push(photo.url); // already public URL
  });

  let saved = 0, errors = 0;
  for (const tripId of Object.keys(assignments)) {
    const { data: current, error: loadErr } = await supa.from('trips').select('*').eq('id', tripId).maybeSingle();
    if (loadErr || !current) { errors++; continue; }

    const mergedDays = JSON.parse(JSON.stringify((current.data && current.data.days) || []));

    // For each stop: REPLACE userPhotos with our recovered public URLs
    // Also convert any remaining signed URLs that weren't in our recovery set
    mergedDays.forEach((day, di) => {
      (day.stops || []).forEach((stop, si) => {
        // Convert existing signed URLs → public
        const existing = (stop.userPhotos || []).map(toPublicUrl).filter(Boolean);
        // Add recovered photos that aren't already there
        const recovered = (assignments[tripId][di] && assignments[tripId][di][si]) || [];
        const merged = [...existing];
        recovered.forEach(u => { if (!merged.includes(u)) merged.push(u); });
        stop.userPhotos = merged;
      });
    });

    const payload = {
      ...current,
      data: { ...(current.data || {}), days: mergedDays, savedAt: new Date().toISOString() }
    };
    const { error } = await supa.from('trips').upsert(payload, { onConflict: 'id' });
    if (error) { console.error('Save error for', tripId, error); errors++; }
    else { saved++; console.log('Saved', tripId); }
  }

  btn.disabled = false;
  if (errors) {
    btn.textContent = '⚠️ ' + errors + ' error(s) — try again';
    toast('⚠️ Saved ' + saved + ' trip(s), ' + errors + ' error(s)');
  } else {
    btn.textContent = '✅ Saved!';
    btn.style.background = 'linear-gradient(135deg, #3ecf8e, #1a9e6a)';
    toast('✅ Saved! Reload Trip.html to see your photos.');
  }
}

function status(msg) {
  document.getElementById('status').innerHTML = '<span class="spinner">⏳</span> ' + msg;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

init().catch(e => {
  document.getElementById('status').textContent = '❌ Error: ' + e.message;
});
</script>
</body>
</html>
