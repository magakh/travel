<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Permanent move: forward github.io visitors to travel-guide.ai, preserving path/query/hash
if (location.hostname === 'magakh.github.io') {
  location.replace('https://travel-guide.ai' + location.pathname.replace(/^\/travel/, '') + location.search + location.hash);
}
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Trips</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; min-height: 100vh; }

  .header {
    background: #1a1a1a;
    padding: 20px 16px 16px;
    border-bottom: 1px solid #333;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 22px; font-weight: 800; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }

  .new-btn {
    padding: 10px 18px; border-radius: 20px; border: none;
    background: #1a73e8; color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }

  .trips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding: 20px 16px;
  }

  .trip-card {
    background: #1e1e1e;
    border-radius: 16px;
    border: 1px solid #333;
    overflow: hidden;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .trip-card:hover { border-color: #555; }

  .trip-card-body {
    padding: 18px;
  }
  .trip-slug {
    font-size: 10px; font-weight: 700; color: #666;
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
  }
  .trip-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .trip-subtitle { font-size: 12px; color: #888; margin-bottom: 12px; }
  .trip-meta {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .trip-badge {
    background: #2a2a2a; border: 1px solid #444; border-radius: 20px;
    padding: 3px 10px; font-size: 11px; font-weight: 600; color: #ccc;
  }
  .trip-stops { font-size: 12px; color: #666; margin-bottom: 14px; }

  .trip-actions {
    display: flex; gap: 8px;
    padding: 12px 18px;
    background: #161616;
    border-top: 1px solid #2a2a2a;
  }
  .btn-open {
    flex: 1; padding: 10px; border-radius: 10px; border: none;
    background: #1a73e8; color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer;
  }
  input[type="date"] { color-scheme: dark; cursor: pointer; }
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; padding: 6px; }
.btn-delete {
    padding: 10px 14px; border-radius: 10px;
    border: 1px solid #c0392b; background: transparent;
    color: #c0392b; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-delete:hover { background: #2a0a0a; }

  .loading {
    text-align: center; padding: 60px 20px; color: #666; font-size: 14px;
  }
  .empty {
    text-align: center; padding: 60px 20px;
  }
  .empty p { color: #666; font-size: 14px; margin-bottom: 16px; }

  /* New trip modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: #1e1e1e; border-radius: 20px 20px 0 0;
    padding: 24px; width: 100%; max-width: 520px;
  }
  .modal h2 { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
  .form-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; margin-top: 12px; }
  .form-input {
    width: 100%; padding: 11px 14px; border: 1px solid #444; border-radius: 10px;
    font-size: 14px; background: #111; color: #fff; outline: none;
  }
  .form-input:focus { border-color: #1a73e8; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
  .btn-cancel { background: #2a2a2a; color: #fff; }
  .btn-create { background: #1a73e8; color: #fff; }

  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 1001;
    padding: 20px;
  }
  .confirm-box {
    background: #1e1e1e; border-radius: 16px; padding: 24px;
    width: 100%; max-width: 320px; text-align: center;
  }
  .confirm-box p { font-size: 14px; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
  .confirm-box h3 { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✈️ My Trips</h1>
    <p id="tripCount">Loading...</p>
    <p id="acctRow" style="font-size:12px;color:#888;margin:4px 0 0;"></p>
  </div>
  <button class="new-btn" onclick="showNewTripModal()">+ New trip</button>
</div>

<div id="tripsContainer" class="loading">Loading trips...</div>

<script>
const SUPABASE_URL = 'https://wnpanbjzmcsvhfyjdczv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InducGFuYmp6bWNzdmhmeWpkY3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NzU4NjcsImV4cCI6MjA5MjA1MTg2N30.r3Vie2AAOfzYmLy4IRUk1s9mjkC6bDSoxAIYKfcz6jQ';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allTrips = [];
let CURRENT_USER = null;
let USER_PROFILE = null;

// ── AUTH GATE — same account as the trip app (session is shared) ──
function requireAuth() {
  return new Promise(async (resolve) => {
    let done = false;
    const finish = (u) => { if (done) return; done = true; CURRENT_USER = u; const g = document.getElementById('auth-gate'); if (g) g.remove(); resolve(u); };
    try { supa.auth.onAuthStateChange((ev, session) => { if (session && session.user) finish(session.user); }); } catch(e) {}
    try {
      const { data } = await supa.auth.getSession();
      if (data && data.session && data.session.user) { finish(data.session.user); return; }
    } catch(e) {}
    showAuthGate();
  });
}

function showAuthGate() {
  if (document.getElementById('auth-gate')) return;
  const div = document.createElement('div');
  div.id = 'auth-gate';
  div.style.cssText = 'position:fixed;inset:0;z-index:100000;background:#0d0d0d;display:flex;align-items:center;justify-content:center;padding:20px;';
  div.innerHTML =
    '<div style="background:#181818;border:1px solid #2a2a2a;border-radius:18px;padding:28px 22px;width:100%;max-width:360px;">' +
      '<div style="font-size:22px;font-weight:800;margin-bottom:4px;color:#fff;">🧳 Travel Guide</div>' +
      '<div style="font-size:13px;color:#888;margin-bottom:20px;">Sign in to see your trips</div>' +
      '<input id="authName" type="text" placeholder="Your name (for new accounts)" autocomplete="name" style="width:100%;box-sizing:border-box;padding:12px;border:1px solid #333;background:#0d0d0d;color:#fff;border-radius:10px;font-size:15px;margin-bottom:10px;">' +
      '<input id="authEmail" type="email" placeholder="Email" autocomplete="email" style="width:100%;box-sizing:border-box;padding:12px;border:1px solid #333;background:#0d0d0d;color:#fff;border-radius:10px;font-size:15px;margin-bottom:10px;">' +
      '<input id="authPassword" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;box-sizing:border-box;padding:12px;border:1px solid #333;background:#0d0d0d;color:#fff;border-radius:10px;font-size:15px;margin-bottom:14px;">' +
      '<button onclick="authSignIn()" style="width:100%;padding:13px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:8px;">Sign in</button>' +
      '<button onclick="authSignUp()" style="width:100%;padding:13px;background:transparent;color:#fff;border:1.5px solid #444;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:14px;">Create account</button>' +
      '<button onclick="authOAuth(\'google\')" style="width:100%;padding:12px;background:#fff;color:#333;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>Continue with Google</button>' +
      '<div style="text-align:center;margin-top:12px;"><a href="#" onclick="authMagicLink();return false;" style="font-size:13px;color:#5b9cff;text-decoration:none;">✉️ Email me a magic link instead</a></div>' +
      '<div id="authMsg" style="font-size:13px;margin-top:12px;text-align:center;min-height:18px;color:#888;"></div>' +
      '<div style="font-size:12px;color:#666;margin-top:14px;text-align:center;">New here? Enter your details and tap Create account, or just continue with Google.</div>' +
    '</div>';
  document.body.appendChild(div);
  const ue = authUrlError();
  if (ue) authMsg(ue, true);
}

function authMsg(t, isErr) { const el = document.getElementById('authMsg'); if (el) { el.textContent = t; el.style.color = isErr ? '#ff6b5b' : '#4ade80'; } }


function authUrlError() {
  const p = new URLSearchParams(location.search + '&' + location.hash.replace(/^#/, ''));
  const desc = p.get('error_description');
  if (!desc) return null;
  if (/state not found|expired/i.test(desc)) return 'That link expired or was opened in a different browser. Your account is likely confirmed — just sign in below.';
  return desc.replace(/\+/g, ' ');
}

async function authSignIn() {
  const email = (document.getElementById('authEmail')||{}).value || '';
  const pw = (document.getElementById('authPassword')||{}).value || '';
  if (!email || !pw) { authMsg('Enter email and password', true); return; }
  authMsg('Signing in…');
  const { error } = await supa.auth.signInWithPassword({ email: email.trim(), password: pw });
  if (error) authMsg(error.message, true);
}

async function authOAuth(provider) {
  authMsg('Redirecting to ' + provider + '…');
  const { error } = await supa.auth.signInWithOAuth({
    provider: provider,
    options: { redirectTo: location.origin + location.pathname }
  });
  if (error) authMsg(error.message, true);
}

async function authSignUp() {
  const email = (document.getElementById('authEmail')||{}).value || '';
  const pw = (document.getElementById('authPassword')||{}).value || '';
  const name = ((document.getElementById('authName')||{}).value || '').trim();
  if (!email || !pw) { authMsg('Enter email and a password (6+ characters)', true); return; }
  authMsg('Creating account…');
  const { data, error } = await supa.auth.signUp({
    email: email.trim(), password: pw,
    options: { emailRedirectTo: location.origin + location.pathname, data: { name: name } }
  });
  if (error) { authMsg(error.message, true); return; }
  if (data && data.session) return; // confirm-email off — signed in immediately
  authMsg('✉️ Check your email to confirm your account, then come back here.');
}

async function authMagicLink() {
  const email = (document.getElementById('authEmail')||{}).value || '';
  if (!email) { authMsg('Enter your email first', true); return; }
  authMsg('Sending link…');
  const { error } = await supa.auth.signInWithOtp({ email: email.trim(), options: { emailRedirectTo: location.origin + location.pathname } });
  if (error) { authMsg(error.message, true); return; }
  authMsg('✉️ Magic link sent — check your email.');
}

async function signOutUser() { try { await supa.auth.signOut(); } catch(e) {} location.reload(); }

function isFounder() { return USER_PROFILE && USER_PROFILE.role === 'founder'; }
function canManage(trip) { return isFounder() || (trip.owner_id && CURRENT_USER && trip.owner_id === CURRENT_USER.id); }

async function loadTrips() {
  const user = await requireAuth();
  try {
    const { data: prof } = await supa.from('profiles').select('*').eq('id', user.id).maybeSingle();
    USER_PROFILE = prof || null;
  } catch(e) {}
  const acct = document.getElementById('acctRow');
  if (acct) acct.innerHTML = '👤 ' + (user.email || '') + (isFounder() ? ' · founder' : (USER_PROFILE ? ' · ' + (USER_PROFILE.credits||0) + ' credits' : '')) +
    ' &nbsp;<a href="#" onclick="signOutUser();return false;" style="color:#5b9cff;text-decoration:none;">Sign out</a>';

  let { data, error } = await supa.from('trips').select('id, owner_id, title, subtitle, config, data, updated_at').order('updated_at', { ascending: false });
  if (error && /owner_id|updated_at/.test(error.message || '')) {
    // DB migration not run yet — fall back to base columns
    const r2 = await supa.from('trips').select('id, title, subtitle, config, data');
    data = r2.data; error = r2.error;
  }
  if (error) { document.getElementById('tripsContainer').innerHTML = '<div class="loading">Failed to load trips: ' + (error.message || 'unknown error') + '</div>'; return; }
  // Founders see everything; everyone else sees the trips they own
  allTrips = (data || []).filter(t => isFounder() || (t.owner_id && t.owner_id === user.id));
  renderTrips();
}

function renderTrips() {
  const container = document.getElementById('tripsContainer');
  document.getElementById('tripCount').textContent = allTrips.length + ' trip' + (allTrips.length !== 1 ? 's' : '');

  if (allTrips.length === 0) {
    container.innerHTML = '<div class="empty"><p>No trips yet. Create your first one!</p></div>';
    return;
  }

  container.innerHTML = '<div class="trips-grid">' + allTrips.map(trip => {
    const cfg = trip.config || {};
    const data = trip.data || {};
    const days = data.days || [];
    const numDays = cfg.numDays || days.length || 0;
    const totalStops = days.reduce((sum, d) => sum + (d.stops || []).length, 0);
    const labels = cfg.dayLabels || [];
    const dateRange = labels.length >= 2 ? labels[0] + ' – ' + labels[labels.length - 1] : (numDays + ' days');
    const updated = trip.updated_at ? new Date(trip.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

    return `
      <div class="trip-card" onclick="openTrip('${trip.id}')">
        <div class="trip-card-body">
          <div class="trip-slug">${trip.id}</div>
          <div class="trip-title">${trip.title || trip.id}</div>
          <div class="trip-subtitle">${trip.subtitle || cfg.subtitle || ''}</div>
          <div class="trip-meta">
            <span class="trip-badge">📅 ${dateRange}</span>
            <span class="trip-badge">📍 ${totalStops} stops</span>
          </div>
          ${updated ? `<div class="trip-stops">Last updated ${updated}</div>` : ''}
        </div>
        <div class="trip-actions" onclick="event.stopPropagation()">
          <button class="btn-open" onclick="openTrip('${trip.id}')">Open →</button>
          ${canManage(trip) ? `<button class="btn-delete" onclick="confirmDelete('${trip.id}', '${(trip.title || trip.id).replace(/'/g, "\\'")}')">🗑</button>` : ''}
        </div>
      </div>`;
  }).join('') + '</div>';
}

function openTrip(id) {
  window.location.href = 'Trip.html?trip=' + encodeURIComponent(id);
}

function confirmDelete(id, title) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>Delete trip?</h3>
      <p>"${title}" and all its stops will be permanently deleted.</p>
      <div class="confirm-actions">
        <button style="background:#2a2a2a;color:#fff;" onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button style="background:#c0392b;color:#fff;" onclick="deleteTrip('${id}', this.closest('.confirm-overlay'))">Delete</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

async function deleteTrip(id, overlay) {
  const deleteBtn = overlay.querySelector('button:last-child');
  deleteBtn.textContent = 'Deleting...';
  deleteBtn.disabled = true;

  const { data: res, error } = await supa.rpc('delete_trip', { p_id: id });
  overlay.remove();

  if (error) { alert('Delete failed: ' + error.message); return; }
  if (!res || res.ok !== true) {
    alert(res && res.reason === 'not_owner' ? 'Only the trip owner can delete this trip.' : 'Delete failed.');
    return;
  }

  allTrips = allTrips.filter(t => t.id !== id);
  renderTrips();
}

function showNewTripModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h2>✈️ New Trip</h2>
      <label class="form-label">Trip ID (URL slug)</label>
      <input class="form-input" id="nt-slug" placeholder="e.g. paris2026" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_-]/g,'')">
      <label class="form-label">Title</label>
      <input class="form-input" id="nt-title" placeholder="e.g. Paris Spring 2026">
      <label class="form-label">Subtitle (optional)</label>
      <input class="form-input" id="nt-subtitle" placeholder="e.g. museums & bistros">
      <label class="form-label">Start date</label>
      <input class="form-input" id="nt-start" type="date" onclick="try{this.showPicker()}catch(e){}">
      <label class="form-label">End date</label>
      <input class="form-input" id="nt-end" type="date" onclick="try{this.showPicker()}catch(e){}">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button class="btn-create" onclick="createTrip(this)">Create →</button>
      </div>
    </div>`;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('nt-slug').focus(), 60);
}

async function createTrip(btn) {
  const slug = document.getElementById('nt-slug').value.trim();
  const title = document.getElementById('nt-title').value.trim();
  const subtitle = document.getElementById('nt-subtitle').value.trim();
  const startVal = document.getElementById('nt-start').value;
  const endVal = document.getElementById('nt-end').value;

  if (!slug || !title) { alert('Trip ID and title are required.'); return; }

  let numDays = 4, dayLabels = [], dayTitles = [];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (startVal && endVal) {
    const [sy, smo, sd] = startVal.split('-').map(Number);
    const [ey, emo, ed] = endVal.split('-').map(Number);
    numDays = Math.max(1, Math.round((new Date(ey, emo-1, ed) - new Date(sy, smo-1, sd)) / 86400000) + 1);
    for (let i = 0; i < numDays; i++) {
      const dt = new Date(sy, smo-1, sd+i);
      const lbl = monthNames[dt.getMonth()] + ' ' + dt.getDate();
      dayLabels.push(lbl);
      dayTitles.push(lbl + ' · Day ' + (i+1));
    }
  } else {
    for (let i = 0; i < numDays; i++) { dayLabels.push('Day '+(i+1)); dayTitles.push('Day '+(i+1)); }
  }

  btn.textContent = 'Creating...';
  btn.disabled = true;

  const days = dayLabels.map((lbl, i) => ({ title: dayTitles[i], note: '', stops: [] }));
  const payload = {
    id: slug, title, subtitle,
    config: { title, subtitle, numDays, dayLabels, dayTitles, startDate: startVal || '' },
    data: { days, completed: [], hotel: null, savedAt: new Date().toISOString() }
  };

  const { data: cr, error } = await supa.rpc('create_trip', {
    p_id: slug, p_title: title, p_subtitle: subtitle,
    p_config: payload.config, p_data: payload.data
  });
  if (error || !cr || cr.ok !== true) {
    const reason = cr && cr.reason;
    let msg = 'Failed to create trip.';
    if (reason === 'slug_taken') msg = 'That Trip ID already exists — pick another.';
    else if (reason === 'no_credits') msg = 'You are out of trip credits. Credit packs are coming soon!';
    else if (reason === 'no_profile') msg = 'No account profile found — sign out and back in.';
    else if (error) msg = 'Failed: ' + error.message;
    alert(msg);
    btn.textContent = 'Create →'; btn.disabled = false;
    return;
  }
  window.location.href = 'Trip.html?trip=' + encodeURIComponent(slug);
}

loadTrips();
</script>
</body>
</html>
